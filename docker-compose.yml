version: '3.8'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm_user -d crm_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Node.js / Express backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password@postgres:5432/crm_db
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 24h
      ORACLE_USERNAME: ${ORACLE_USERNAME:-Ramana@ibrahimalqurashi.com}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-159159159}
      ORACLE_INVENTORY_API_URL: ${ORACLE_INVENTORY_API_URL:-https://ehxk-test.fa.em2.oraclecloud.com/fscmRestApi/resources/11.13.18.05/inventoryStagedTransactions}
      ORACLE_SOAP_URL: ${ORACLE_SOAP_URL:-https://ehxk-test.fa.em2.oraclecloud.com/fscmService/MiscellaneousReceiptService}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ──────────────────────────────────────────────
  # React / Vite frontend (served by Nginx in prod)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
